const LocationSelector = ({ name, setName, dist, setDist, setGroup, placeholder, size = "large" }) => {
  const [isOpen, setIsOpen] = useState(false);
  const [search, setSearch] = useState('');
  const wrapperRef = useRef(null);

  useEffect(() => {
    function handleClickOutside(event) { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); }
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, []);

  const groups = [ { id: 1, label: "超短途" }, { id: 2, label: "短途 1" }, { id: 3, label: "短途 2" }, { id: 4, label: "中途" }, { id: 5, label: "長途" }, { id: 6, label: "超長途" } ];
  const inputClass = "w-full border border-gray-300 focus:ring-2 focus:ring-[#006564] focus:outline-none bg-white text-sm " + (size === 'large' ? 'p-3 rounded-xl' : 'p-2 rounded-lg');

  return (
    <div className="flex gap-2 items-start" ref={wrapperRef}>
      <div className="relative flex-1">
        <input type="text" value={name} onChange={(e) => { setName(e.target.value); setSearch(e.target.value); setIsOpen(true); }} onClick={() => { setSearch(''); setIsOpen(true); }} placeholder={placeholder || "輸入"} className={inputClass} />
        {isOpen && (
          <div className="absolute z-20 w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-xl max-h-64 overflow-y-auto">
            {groups.map(g => {
              const options = Object.values(airportData).filter(a => a.group === g.id && (search === '' || a.name.includes(search) || a.iata.toLowerCase().includes(search.toLowerCase())));
              if (options.length === 0) return null;
              return (
                <div key={g.id}>
                  <div className="px-3 py-1.5 bg-gray-100 text-xs font-bold text-gray-500 sticky top-0">{g.label}</div>
                  {options.map(a => (
                    <div key={a.iata} className="px-3 py-2 text-sm hover:bg-[#e6f0f0] cursor-pointer border-b border-gray-50" onClick={() => { setName(a.name + ' (' + a.iata.split('/')[0] + ')'); setDist(a.distance); setGroup(a.group); setIsOpen(false); }}>
                      <span className="font-medium text-gray-700">{a.name}</span> <span className="text-gray-500">({a.iata})</span><span className="float-right text-gray-400 text-xs mt-0.5">{a.distance} mi</span>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        )}
      </div>
      <div className="w-24">
        <input type="number" value={dist} onChange={(e) => setDist(e.target.value)} placeholder="距離" className={inputClass} />
      </div>
    </div>
  );
};

const App = () => {
  const [mode, setMode] = useState('direct');
  const [directName, setDirectName] = useState('台北 (TPE)');
  const [directDist, setDirectDist] = useState(501);
  const [directGroup, setDirectGroup] = useState(1);
  const [directCabin, setDirectCabin] = useState('eco');
  const [leg1Name, setLeg1Name] = useState('台北 (TPE)');
  const [leg1Dist, setLeg1Dist] = useState(501);
  const [leg1Group, setLeg1Group] = useState(1);
  const [leg1Cabin, setLeg1Cabin] = useState('eco');
  const [leg2Name, setLeg2Name] = useState('倫敦 (LHR)');
  const [leg2Dist, setLeg2Dist] = useState(5994);
  const [leg2Group, setLeg2Group] = useState(5);
  const [leg2Cabin, setLeg2Cabin] = useState('biz');
  const [transferName, setTransferName] = useState('香港 (HKG)');

  const calculateResult = useMemo(() => {
    if (mode === 'direct') {
      const dist = Number(directDist); if (!dist) return null;
      let zone = dist > 7501 ? "Ultra-Long" : dist > 5000 ? "Long" : dist > 2750 ? "Medium" : dist > 750 ? (directGroup === 3 ? "Short 2" : "Short 1") : "Ultra-Short";
      const miles = awardChart[zone][directCabin];
      return { type: 'direct', distance: dist, zone, miles, error: miles === 0 ? "此航線不設所選艙位" : null };
    } else {
      const dist1 = Number(leg1Dist); const dist2 = Number(leg2Dist); if (!dist1 || !dist2) return null;
      const totalDist = dist1 + dist2;
      let zone = totalDist > 7501 ? "Ultra-Long" : totalDist > 5000 ? "Long" : totalDist > 2750 ? "Medium" : totalDist > 750 ? (leg1Group === 3 || leg2Group === 3 ? "Short 2" : "Short 1") : "Ultra-Short";
      const m1 = awardChart[zone][leg1Cabin]; const m2 = awardChart[zone][leg2Cabin];
      if (m1 === 0 || m2 === 0) return { error: "該區間不支援選定艙位" };
      const req1 = (dist1 / totalDist) * m1; const req2 = (dist2 / totalDist) * m2;
      const totalRaw = req1 + req2;
      const miles = Math.round(totalRaw / 100) * 100;
      const cabinWeights = { eco: 1, pe: 2, biz: 3, first: 4 };
      const highestCabin = cabinWeights[leg1Cabin] > cabinWeights[leg2Cabin] ? leg1Cabin : leg2Cabin;
      const standardHighestMiles = awardChart[zone][highestCabin];
      const getZ = (d, g) => d > 7501 ? "Ultra-Long" : d > 5000 ? "Long" : d > 2750 ? "Medium" : d > 750 ? (g === 3 ? "Short 2" : "Short 1") : "Ultra-Short";
      const separateMiles = awardChart[getZ(dist1, leg1Group)][leg1Cabin] + awardChart[getZ(dist2, leg2Group)][leg2Cabin];
      return { type: 'transit', totalDist, dist1, dist2, zone, m1, m2, req1, req2, totalRaw, miles, standardHighestMiles, separateMiles, error: null };
    }
  }, [mode, directDist, directGroup, directCabin, leg1Dist, leg1Group, leg1Cabin, leg2Dist, leg2Group, leg2Cabin]);

  return (
    <div className="min-h-screen bg-gray-50 text-gray-800 font-sans p-4 md:p-8">
      <div className="max-w-4xl mx-auto space-y-6 pb-12">
        <div className="flex justify-between items-center bg-white p-4 md:px-6 rounded-2xl shadow-sm border border-gray-100">
          <div className="flex items-center">
            <img src="./logo.png" alt="PointsToMiles Logo" className="h-80 md:h-96 object-contain" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
            <div className="hidden flex-col"><span className="text-sm font-bold text-gray-800 tracking-wider">里數著數儲得快</span><span className="text-xl font-black text-[#f37c4b] leading-none">PointsToMiles</span></div>
          </div>
          <div className="flex items-center gap-2 md:gap-3">
            <a href="https://www.facebook.com/PointsToMiles/" target="_blank" rel="noreferrer" title="Facebook" className="p-2 text-[#1877F2] bg-blue-50 hover:bg-blue-100 rounded-full transition-colors shadow-sm"><Facebook className="w-6 h-6 fill-current" /></a>
            <a href="https://www.instagram.com/pointstomiles_hk/" target="_blank" rel="noreferrer" title="Instagram" className="p-2 text-[#E4405F] bg-pink-50 hover:bg-pink-100 rounded-full transition-colors shadow-sm"><Instagram className="w-6 h-6" /></a>
            <a href="https://www.threads.com/@pointstomiles_hk" target="_blank" rel="noreferrer" title="Threads" className="p-2 text-black bg-gray-100 hover:bg-gray-200 rounded-full transition-colors shadow-sm"><ThreadsIcon className="w-6 h-6" /></a>
          </div>
        </div>

        <div className="bg-[#006564] text-white p-6 rounded-2xl shadow-lg flex items-center justify-between">
          <div><h1 className="text-2xl md:text-3xl font-bold flex items-center gap-2"><Plane className="w-8 h-8" /> 國泰 Asia Miles 兌換計算機</h1><p className="mt-2 text-[#b2d8d8]">精確計算新制直航及混合艙 (Mixed Cabin) 里數需求</p></div>
        </div>

        <div className="flex bg-white rounded-xl shadow-sm p-1 border border-gray-100">
          <button onClick={() => setMode('direct')} className={"flex-1 py-3 px-4 rounded-lg font-medium transition-all " + (mode === 'direct' ? 'bg-[#006564] text-white shadow-md' : 'text-gray-500 hover:bg-gray-50')}>直航兌換 (單一艙等)</button>
          <button onClick={() => setMode('transit')} className={"flex-1 py-3 px-4 rounded-lg font-medium transition-all " + (mode === 'transit' ? 'bg-[#006564] text-white shadow-md' : 'text-gray-500 hover:bg-gray-50')}>轉機兌換 (混合艙 Mixed Cabin)</button>
        </div>

        <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
          {mode === 'direct' ? (
            <div className="space-y-4">
              <h2 className="text-lg font-bold text-gray-700 mb-4 flex items-center gap-2"><MapPin className="w-5 h-5 text-[#006564]"/> 航線設定 (直航)</h2>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label className="block text-sm font-medium text-gray-600 mb-2">目的地 / 出發地</label><LocationSelector name={directName} setName={setDirectName} dist={directDist} setDist={setDirectDist} setGroup={setDirectGroup} size="large" /></div>
                <div><label className="block text-sm font-medium text-gray-600 mb-2">艙等</label><select value={directCabin} onChange={e => setDirectCabin(e.target.value)} className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-[#006564] focus:outline-none"><option value="eco">經濟艙</option><option value="pe">特選經濟艙</option><option value="biz">商務艙</option><option value="first">頭等艙</option></select></div>
              </div>
            </div>
          ) : (
            <div className="space-y-6">
              <div className="flex flex-col md:flex-row items-start gap-4">
                <div className="flex-1 w-full bg-gray-50 p-4 rounded-xl border border-gray-100 relative">
                  <h3 className="font-bold text-gray-700 mb-3">航段 1</h3>
                  <div className="space-y-4">
                    <div><label className="block text-xs font-medium text-gray-500 mb-1">起點</label><LocationSelector name={leg1Name} setName={setLeg1Name} dist={leg1Dist} setDist={setLeg1Dist} setGroup={setLeg1Group} size="small" /></div>
                    <div><label className="block text-xs font-medium text-gray-500 mb-1">艙等</label><select value={leg1Cabin} onChange={e => setLeg1Cabin(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#006564] text-sm bg-white"><option value="eco">經濟艙</option><option value="pe">特選經濟</option><option value="biz">商務艙</option><option value="first">頭等艙</option></select></div>
                  </div>
                </div>
                <div className="hidden md:flex flex-col items-center justify-center px-2 pt-10">
                  <div className="bg-[#006564] text-white text-xs font-bold px-3 py-1 rounded-full mb-2 shadow-sm">轉機點</div>
                  <select value={transferName} onChange={e => setTransferName(e.target.value)} className="font-bold border-b-2 border-gray-300 focus:border-[#006564] focus:outline-none bg-transparent pb-1 transition-colors"><option value="香港 (HKG)">香港 (HKG)</option><option value="台北 (TPE)">台北 (TPE)</option></select>
                  <ArrowRightLeft className="w-5 h-5 text-gray-400 mt-2 animate-pulse" />
                </div>
                <div className="flex-1 w-full bg-gray-50 p-4 rounded-xl border border-gray-100">
                  <h3 className="font-bold text-gray-700 mb-3">航段 2</h3>
                  <div className="space-y-4">
                    <div><label className="block text-xs font-medium text-gray-500 mb-1">終點</label><LocationSelector name={leg2Name} setName={setLeg2Name} dist={leg2Dist} setDist={setLeg2Dist} setGroup={setLeg2Group} size="small" /></div>
                    <div><label className="block text-xs font-medium text-gray-500 mb-1">艙等</label><select value={leg2Cabin} onChange={e => setLeg2Cabin(e.target.value)} className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#006564] text-sm bg-white"><option value="eco">經濟艙</option><option value="pe">特選經濟</option><option value="biz">商務艙</option><option value="first">頭等艙</option></select></div>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>

        {calculateResult && !calculateResult.error && (
          <div className="bg-white p-6 rounded-2xl shadow-md border-t-4 border-[#006564] space-y-6">
            <div className="flex justify-between items-center border-b pb-4">
              <div><p className="text-sm text-gray-500 font-medium">總計所需 Asia Miles</p><h2 className="text-4xl md:text-5xl font-extrabold text-[#006564] mt-1">{calculateResult.miles.toLocaleString()} <span className="text-lg text-gray-400 font-normal">里</span></h2></div>
              <div className="text-right font-medium"><p className="text-xs text-gray-400">總距離: {mode === 'direct' ? calculateResult.distance : calculateResult.totalDist} mi</p><span className="inline-block mt-1 px-2 py-1 bg-[#e6f0f0] text-[#006564] text-xs font-bold rounded-md">區域: {calculateResult.zone}</span></div>
            </div>
            {mode === 'transit' && (
              <div className="bg-gray-50 rounded-xl p-5 text-sm space-y-3 border border-gray-200 shadow-inner">
                <h4 className="font-bold text-gray-700 flex items-center gap-2"><Calculator className="w-4 h-4"/> 混合艙拆解</h4>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                  <div className="bg-white p-3 rounded-lg border shadow-sm transition-transform hover:scale-[1.02]">航段 1: {leg1Name.split(' ')[0]} ✈ {transferName.split(' ')[0]}<br/><span className="font-bold text-[#006564] text-base">{Math.round(calculateResult.req1).toLocaleString()} 里</span></div>
                  <div className="bg-white p-3 rounded-lg border shadow-sm transition-transform hover:scale-[1.02]">航段 2: {transferName.split(' ')[0]} ✈ {leg2Name.split(' ')[0]}<br/><span className="font-bold text-[#006564] text-base">{Math.round(calculateResult.req2).toLocaleString()} 里</span></div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3 pt-4 border-t border-gray-200">
                  <div className="p-3 border rounded-xl opacity-60 bg-white">分開兌換: <span className="font-bold">{calculateResult.separateMiles.toLocaleString()}</span></div>
                  <div className="p-3 border rounded-xl opacity-60 bg-white">全程最高艙: <span className="font-bold">{calculateResult.standardHighestMiles.toLocaleString()}</span></div>
                  <div className="p-3 bg-[#e6f0f0] border border-[#006564] rounded-xl font-bold text-[#006564] shadow-sm">混合艙: {calculateResult.miles.toLocaleString()}</div>
                </div>
              </div>
            )}
          </div>
        )}
        
        {calculateResult && calculateResult.error && (
          <div className="bg-white p-6 rounded-2xl shadow-md border-t-4 border-red-500">
            <div className="p-4 bg-red-50 text-red-600 rounded-xl font-medium flex items-center gap-2">
              <Info className="w-5 h-5"/> {calculateResult.error}
            </div>
          </div>
        )}

        <div className="mt-12 pt-8 border-t border-gray-200 text-center">
          <p className="text-gray-500 font-medium flex items-center justify-center gap-2">
            <Mail className="w-4 h-4 text-[#006564]" /> 建議及問題反映
          </p>
          <a href="mailto:travelfrommiles@gmail.com" className="text-[#006564] hover:text-[#004f4e] font-bold text-lg mt-1 inline-block transition-colors hover:underline">
            travelfrommiles@gmail.com
          </a>
          <p className="text-gray-400 text-xs mt-4">© 2026 PointsToMiles. All Rights Reserved.</p>
        </div>
      </div>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
</body>
</html>
