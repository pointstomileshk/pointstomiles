const getZone = (dist, group) => {
  if (dist > 7501) return "Ultra-Long";
  if (dist > 5000) return "Long";
  if (dist > 2750) return "Medium";
  if (dist > 750) return group === 3 ? "Short 2" : "Short 1";
  return "Ultra-Short";
};

const LocationSelector = ({ name, setName, dist, setDist, setGroup, placeholder, airports, hubForDistance, showDistInput = true }) => {
  const [isOpen, setIsOpen] = useState(false);
  const [search, setSearch] = useState('');
  const wrapperRef = useRef(null);

  useEffect(() => {
    const hide = (e) => { if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setIsOpen(false); };
    document.addEventListener("mousedown", hide);
    return () => document.removeEventListener("mousedown", hide);
  }, []);

  const list = useMemo(() => {
    return Object.values(airports).filter(a => 
      a.name.toLowerCase().includes(search.toLowerCase()) || a.iata.toLowerCase().includes(search.toLowerCase())
    ).sort((a,b) => a.iata.localeCompare(b.iata));
  }, [airports, search]);

  return (
    <div className="flex gap-2 items-start relative w-full" ref={wrapperRef}>
      <div className="relative flex-1 text-left">
        <div className="relative">
          <input 
            type="text" value={name} 
            onChange={(e) => { setName(e.target.value); setSearch(e.target.value); setIsOpen(true); }} 
            onClick={() => { setSearch(''); setIsOpen(true); }} 
            placeholder={placeholder || "輸入城市/IATA"} 
            className="w-full border border-slate-200 shadow-inner p-3 md:p-4 rounded-2xl bg-white text-sm md:text-base focus:ring-2 focus:ring-[#006564] focus:border-transparent outline-none transition-all duration-300 pr-10"
          />
          <Search size={18} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-300" />
        </div>
        {isOpen && list.length > 0 && (
          <div className="absolute z-[100] w-full mt-2 bg-white/95 backdrop-blur-xl border border-slate-100 rounded-2xl shadow-2xl max-h-56 md:max-h-80 overflow-y-auto custom-scrollbar text-left text-gray-700 animate-fade-in-up ring-1 ring-black/5">
            <div className="p-1">
              {list.map(a => {
                let displayDist = a.distance;
                let displayGrp = a.group;
                if (hubForDistance === 'TPE') {
                    if (TPE_ROUTES[a.iata]) { displayDist = TPE_ROUTES[a.iata].distance; displayGrp = TPE_ROUTES[a.iata].group; } 
                    else if (a.iata === 'TPE') { displayDist = 0; displayGrp = 1; } 
                    else { displayDist = 0; }
                }

                return (
                  <div key={a.iata} className="px-4 py-3 text-xs md:text-sm hover:bg-[#006564]/10 cursor-pointer rounded-xl flex justify-between items-center transition-all group" 
                    onClick={() => { setName(`${a.name} (${a.iata})`); setDist(displayDist); setGroup(displayGrp); setIsOpen(false); }}>
                    <div className="flex items-center gap-3">
                      <div className="bg-slate-50 px-2 py-1 rounded-lg border border-slate-100 text-[#006564] font-black text-[10px] md:text-xs group-hover:bg-[#006564] group-hover:text-white transition-colors">{a.iata}</div>
                      <span className="font-bold text-gray-700 group-hover:text-gray-900">{a.name}</span>
                    </div>
                    {displayDist === 0 && <span className="text-[9px] md:text-[10px] text-red-500 font-black tracking-tighter bg-red-50 px-2 py-0.5 rounded-full ring-1 ring-red-100">無直飛</span>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
      {showDistInput && (
        <div className="relative">
          <input type="number" value={dist} onChange={(e) => setDist(e.target.value)} placeholder="mi" className="w-20 md:w-28 border border-slate-200 shadow-inner p-3 md:p-4 rounded-2xl text-xs md:text-base bg-slate-50 text-center outline-none transition-all duration-300 focus:ring-2 focus:ring-[#006564] focus:bg-white font-mono" />
          <span className="absolute -top-5 left-1/2 -translate-x-1/2 text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Dist</span>
        </div>
      )}
    </div>
  );
};

                      </div>
                    )}
                  </div>
                ))}
              </div>
              {mode === 'transit' && analysis.bestId === 'separate' && (
                <div className="mt-4 p-5 md:p-6 bg-gradient-to-r from-amber-50 to-orange-50 text-amber-900 rounded-[2rem] text-[11px] md:text-sm border border-amber-200/50 flex items-start gap-3 md:gap-4 shadow-sm text-left leading-relaxed animate-fade-in-up">
                  <div className="bg-amber-500 p-2 rounded-xl text-white shadow-md flex-shrink-0"><Info size={20} /></div>
                  <div>
                    <strong className="block text-amber-700 mb-1">風險提醒：最划算換法為「分開單程兌換」</strong>
                    這代表你需要分開兩張機票預訂。留意<strong>行李可能無法直掛 (Check-through)</strong>；且兩段分開收取的<strong>稅金通常會比單一混合艙更高</strong>，請綜合衡量。
                  </div>
                </div>
              )}
            </div>
          )}

          {analysis?.error && (
            <div className="p-5 md:p-6 bg-red-50/90 text-red-600 rounded-[2rem] text-xs md:text-sm font-bold text-left border-2 border-red-200 flex items-start gap-3 md:gap-4 shadow-lg mt-2 animate-fade-in-up backdrop-blur-sm relative z-50">
              <Info className="w-5 h-5 flex-shrink-0 mt-0.5" /> <span>{analysis.error}</span>
            </div>
          )}

          {/* 管理後台 */}
          {!isExported && (
            <React.Fragment>
              <div className="flex flex-col md:flex-row justify-between items-center pt-8 md:pt-12 px-2 pb-4 gap-4">
                <button onClick={exportResult} className="w-full md:w-auto text-[#006564] hover:text-white flex items-center justify-center gap-2 font-black text-xs transition-all bg-white hover:bg-[#006564] px-6 py-3 rounded-2xl shadow-md border border-[#006564]/20">
                  <Download size={16} /> 輸出網頁成品 HTML
                </button>
                <button onClick={() => setShowMgr(!showMgr)} className="text-slate-500 hover:text-[#006564] flex items-center justify-center gap-2 font-black text-xs transition-all px-4 py-3 hover:bg-white rounded-2xl">
                  <Settings size={16} className={showMgr ? "animate-spin" : ""} style={{ animationDuration: '4s' }} /> {showMgr ? '隱藏後台' : '管理 83 個航點'}
                </button>
              </div>
              {showMgr && (
                <div className="glass-panel p-6 md:p-10 rounded-[2.5rem] shadow-2xl border border-slate-200 space-y-6 mt-4 animate-fade-in-up">
                  <h3 className="font-black text-[#006564] text-sm md:text-base text-left tracking-[0.2em] flex items-center gap-2"><Settings size={20}/> 航點資料數據管理</h3>
                  <div className="grid grid-cols-2 md:grid-cols-5 gap-4 text-left items-end">
                    <div className="col-span-1"><label className="text-[10px] font-black text-slate-400 ml-1 uppercase">IATA</label>
                    <input type="text" placeholder="如 TPE" value={mIata} onChange={e=>setMIata(e.target.value.toUpperCase())} className="w-full p-3 md:p-4 border border-slate-200 rounded-xl md:rounded-2xl text-xs md:text-sm outline-none focus:ring-2 focus:ring-[#006564] shadow-inner" /></div>
                    <div className="col-span-1"><label className="text-[10px] font-black text-slate-400 ml-1 uppercase">Name</label>
                    <input type="text" placeholder="台北 Taipei" value={mName} onChange={e=>setMName(e.target.value)} className="w-full p-3 md:p-4 border border-slate-200 rounded-xl md:rounded-2xl text-xs md:text-sm outline-none focus:ring-2 focus:ring-[#006564] shadow-inner" /></div>
                    <div className="col-span-1"><label className="text-[10px] font-black text-slate-400 ml-1 uppercase">Dist</label>
                    <input type="number" placeholder="距離" value={mDist} onChange={e=>setMDist(e.target.value)} className="w-full p-3 md:p-4 border border-slate-200 rounded-xl md:rounded-2xl text-xs md:text-sm outline-none focus:ring-2 focus:ring-[#006564] shadow-inner" /></div>
                    <div className="col-span-1"><label className="text-[10px] font-black text-slate-400 ml-1 uppercase">Zone</label>
                    <select value={mGrp} onChange={e=>setMGrp(Number(e.target.value))} className="w-full p-3 md:p-4 border border-slate-200 rounded-xl md:rounded-2xl text-xs md:text-sm bg-white outline-none cursor-pointer focus:ring-2 focus:ring-[#006564] shadow-inner">
                      <option value={1}>超短途</option><option value={2}>短途 1</option><option value={3}>短途 2</option>
                      <option value={4}>中途</option><option value={5}>長途</option><option value={6}>超長途</option>
                    </select></div>
                    <button onClick={()=>{
                      if(!mIata || !mName || !mDist) return;
                      setAirports({...airports, [mIata]: {iata: mIata, name: mName, distance: Number(mDist), group: mGrp}});
                      setMIata(''); setMName(''); setMDist('');
                    }} className="col-span-2 md:col-span-1 bg-gradient-to-r from-[#006564] to-[#008080] text-white py-3 md:py-4 rounded-xl md:rounded-2xl font-black text-xs md:text-sm shadow-lg active:scale-95">新增</button>
                  </div>
                  <div className="max-h-56 md:max-h-80 overflow-y-auto custom-scrollbar border border-slate-100 rounded-3xl bg-slate-50/50 text-xs shadow-inner">
                    {Object.values(airports).sort((a,b)=>a.iata.localeCompare(b.iata)).map(a => (
                      <div key={a.iata} className="p-4 border-b border-slate-100 last:border-0 flex justify-between items-center hover:bg-white transition-colors group">
                        <div className="flex gap-4 items-center text-left">
                          <span className="bg-white px-2 py-1 rounded shadow-sm font-black text-[10px] md:text-xs border border-slate-200 text-[#006564]">{a.iata}</span>
                          <span className="font-bold text-slate-600">{a.name}</span>
                          <span className="text-slate-400 font-mono tracking-tighter">{a.distance} mi</span>
                        </div>
                        <button onClick={()=>{ const n={...airports}; delete n[a.iata]; setAirports(n); }} className="text-slate-300 hover:text-red-500 p-2 opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={16}/></button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </React.Fragment>
          )}

          {/* Footer */}
          <div className="text-center pt-10 pb-12 opacity-90 space-y-6 animate-fade-in-up">
            <div className="h-[2px] w-16 bg-slate-300 mx-auto rounded-full"></div>
            <p className="text-xs md:text-sm text-slate-500 font-bold px-4 leading-relaxed max-w-2xl mx-auto">
              如果有任何問題或建議，歡迎去{' '}
              <a href="https://www.facebook.com/PointsToMiles/" target="_blank" rel="noopener noreferrer" className="text-[#1877F2] hover:underline decoration-2 underline-offset-4">Facebook</a> /{' '}
              <a href="https://www.instagram.com/pointstomiles_hk/" target="_blank" rel="noopener noreferrer" className="text-[#E4405F] hover:underline decoration-2 underline-offset-4">Instagram</a> 或{' '}
              <a href="https://www.threads.net/@pointstomiles_hk" target="_blank" rel="noopener noreferrer" className="text-slate-900 hover:underline decoration-2 underline-offset-4">Threads</a>{' '}
              搵我哋 💬<br className="hidden md:block" />
              或者 Email 給我們：<a href="mailto:travelfrommiles@gmail.com" className="text-[#006564] hover:underline decoration-2 underline-offset-4 font-black inline-flex items-center gap-1.5 ml-1"><Mail size={16} /> travelfrommiles@gmail.com</a>
            </p>
            <p className="text-[10px] text-slate-400 font-black uppercase tracking-[0.4em]">PointsToMiles · Asia Miles Calculator</p>
          </div>
        </div>
      </div>
    </div>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);

  
</script>
</body>
</html>
