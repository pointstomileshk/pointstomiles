const getZone = (dist, group) => {
  if (dist > 7501) return "Ultra-Long";
  if (dist > 5000) return "Long";
  if (dist > 2750) return "Medium";
  if (dist > 750) return group === 3 ? "Short 2" : "Short 1";
  return "Ultra-Short";
};

const LocationSelector = ({ name, setName, dist, setDist, setGroup, placeholder, airports, hubForDistance }) => {
  const [isOpen, setIsOpen] = useState(false);
  const [search, setSearch] = useState('');
  const wrapperRef = useRef(null);

  useEffect(() => {
    const hide = (e) => { if (wrapperRef.current && !wrapperRef.current.contains(e.target)) setIsOpen(false); };
    document.addEventListener("mousedown", hide);
    return () => document.removeEventListener("mousedown", hide);
  }, []);

  const list = Object.values(airports).filter(a => 
    a.name.includes(search) || a.iata.toLowerCase().includes(search.toLowerCase())
  ).sort((a,b) => a.group - b.group);

  return (
    <div className="flex gap-2 items-start relative" ref={wrapperRef}>
      <div className="relative flex-1 text-left">
        <input 
          type="text" value={name} 
          onChange={(e) => { setName(e.target.value); setSearch(e.target.value); setIsOpen(true); }} 
          onClick={() => { setSearch(''); setIsOpen(true); }} 
          placeholder={placeholder || "輸入城市/IATA"} 
          className="w-full border border-gray-200 shadow-inner p-2.5 md:p-3 rounded-xl bg-white text-sm md:text-base focus:ring-2 focus:ring-[#006564] focus:border-transparent outline-none transition-all duration-300"
        />
        {isOpen && list.length > 0 && (
          <div className="absolute z-[100] w-[120%] md:w-full mt-2 bg-white/95 backdrop-blur-md border border-gray-100 rounded-xl shadow-xl max-h-48 md:max-h-64 overflow-y-auto custom-scrollbar text-left text-gray-700 animate-fade-in-up">
            {list.map(a => {
              let displayDist = a.distance;
              let displayGrp = a.group;
              if (hubForDistance === 'TPE') {
                  if (TPE_ROUTES[a.iata]) { displayDist = TPE_ROUTES[a.iata].distance; displayGrp = TPE_ROUTES[a.iata].group; } 
                  else if (a.iata === 'TPE') { displayDist = 0; displayGrp = 1; } 
                  else { displayDist = 0; }
              }

              return (
                <div key={a.iata} className="px-3 py-2 md:px-4 md:py-3 text-xs md:text-sm hover:bg-[#006564]/10 cursor-pointer border-b border-gray-50 flex justify-between items-center transition-colors" 
                  onClick={() => { setName(`${a.name} (${a.iata})`); setDist(displayDist); setGroup(displayGrp); setIsOpen(false); }}>
                  <span><span className="font-bold text-gray-700">{a.name}</span> <span className="text-gray-400 text-[10px] md:text-xs">({a.iata})</span></span>
                  <span className="text-[10px] md:text-xs text-gray-400 font-mono tracking-tighter">{displayDist > 0 ? `${displayDist} mi` : '無直飛'}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
      <input type="number" value={dist} onChange={(e) => setDist(e.target.value)} placeholder="mi" className="w-16 md:w-24 border border-gray-200 shadow-inner p-2.5 md:p-3 rounded-xl text-xs md:text-base bg-gray-50 text-center outline-none transition-all duration-300 focus:ring-2 focus:ring-[#006564] focus:bg-white" />
    </div>
  );
};

            <div className="flex justify-between items-center pt-4 md:pt-6 px-1 pb-2">
              <button onClick={exportResult} className="text-[#006564] hover:text-white flex items-center gap-1.5 font-bold text-[10px] md:text-xs transition-all bg-[#006564]/10 hover:bg-[#006564] px-3 md:px-4 py-1.5 md:py-2 rounded-lg shadow-sm">
                <Download size={14} /> 輸出完整成品 HTML
              </button>
              <button onClick={() => setShowMgr(!showMgr)} className="text-gray-500 hover:text-[#006564] flex items-center gap-1.5 font-bold text-[10px] md:text-xs transition-all px-2 md:px-3 py-1.5 md:py-2 hover:bg-gray-200/50 rounded-lg">
                <Settings size={14} className={showMgr ? "animate-spin" : ""} style={{ animationDuration: '3s' }} /> {showMgr ? '隱藏管理' : '維護自訂航點'}
              </button>
            </div>

            {showMgr && (
              <div className="glass-panel p-4 md:p-6 rounded-2xl shadow-md border border-gray-200 space-y-4 mt-2 animate-fade-in-up">
                <h3 className="font-bold text-[#006564] text-xs md:text-sm text-left tracking-wide">⚙️ 自訂航點數據管理</h3>
                <div className="grid grid-cols-2 md:grid-cols-5 gap-2 md:gap-3 text-left items-end">
                  <div className="col-span-1 md:col-span-1">
                    <label className="text-[9px] md:text-xs font-bold text-gray-500 ml-1">代碼 (IATA)</label>
                    <input type="text" placeholder="如 TPE" value={mIata} onChange={e=>setMIata(e.target.value.toUpperCase())} className="w-full p-2.5 md:p-3 border border-gray-200 rounded-lg md:rounded-xl text-xs md:text-sm outline-none focus:ring-2 focus:ring-[#006564] shadow-inner transition-all" />
                  </div>
                  <div className="col-span-1 md:col-span-1">
                    <label className="text-[9px] md:text-xs font-bold text-gray-500 ml-1">名稱</label>
                    <input type="text" placeholder="如 台北" value={mName} onChange={e=>setMName(e.target.value)} className="w-full p-2.5 md:p-3 border border-gray-200 rounded-lg md:rounded-xl text-xs md:text-sm outline-none focus:ring-2 focus:ring-[#006564] shadow-inner transition-all" />
                  </div>
                  <div className="col-span-1 md:col-span-1">
                    <label className="text-[9px] md:text-xs font-bold text-gray-500 ml-1">距離 (mi)</label>
                    <input type="number" placeholder="距離" value={mDist} onChange={e=>setMDist(e.target.value)} className="w-full p-2.5 md:p-3 border border-gray-200 rounded-lg md:rounded-xl text-xs md:text-sm outline-none focus:ring-2 focus:ring-[#006564] shadow-inner transition-all" />
                  </div>
                  <div className="col-span-1 md:col-span-1">
                    <label className="text-[9px] md:text-xs font-bold text-gray-500 ml-1">分區</label>
                    <select value={mGrp} onChange={e=>setMGrp(Number(e.target.value))} className="w-full p-2.5 md:p-3 border border-gray-200 rounded-lg md:rounded-xl text-xs md:text-sm bg-white outline-none cursor-pointer focus:ring-2 focus:ring-[#006564] shadow-inner transition-all">
                      <option value={1}>超短途</option><option value={2}>短途 1</option><option value={3}>短途 2</option>
                      <option value={4}>中途</option><option value={5}>長途</option><option value={6}>超長途</option>
                    </select>
                  </div>
                  <button onClick={()=>{
                    if(!mIata || !mName || !mDist) return;
                    setAirports({...airports, [mIata]: {iata: mIata, name: mName, distance: Number(mDist), group: mGrp}});
                    setMIata(''); setMName(''); setMDist('');
                  }} className="col-span-2 md:col-span-1 bg-gradient-to-r from-[#006564] to-[#008080] text-white py-2.5 md:py-3 rounded-lg md:rounded-xl font-bold text-xs md:text-sm shadow-md active:scale-95 transition-all mt-1 md:mt-0 hover:shadow-lg">新增 / 更新</button>
                </div>
                <div className="max-h-36 md:max-h-48 overflow-y-auto custom-scrollbar border border-gray-100 rounded-xl bg-gray-50/80 text-[10px] md:text-xs shadow-inner">
                  {Object.values(airports).sort((a,b)=>a.group-b.group).map(a => (
                    <div key={a.iata} className="p-2.5 md:p-3 border-b border-gray-100 last:border-0 flex justify-between items-center hover:bg-white transition-colors">
                      <div className="flex gap-2.5 md:gap-4 items-center text-left">
                        <span className="bg-white px-1.5 md:px-2 py-0.5 rounded shadow-sm font-black text-[9px] md:text-xs border border-gray-200 text-[#006564]">{a.iata}</span>
                        <span className="font-bold text-gray-700">{a.name}</span>
                        <span className="text-gray-400 font-mono tracking-tighter">{a.distance} mi</span>
                      </div>
                      <button onClick={()=>{ const n={...airports}; delete n[a.iata]; setAirports(n); }} className="text-gray-300 hover:text-red-500 hover:bg-red-50 p-1.5 md:p-2 rounded-md transition-all"><Trash2 size={14}/></button>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </React.Fragment>
        )}

        {/* Footer Contact Info */}
        <div className="text-center pt-8 pb-6 opacity-80 space-y-3 animate-fade-in-up">
          <p className="text-[10px] md:text-xs text-gray-500 font-medium px-4 leading-relaxed">
            如果有任何問題或建議，歡迎去{' '}
            <a href="https://www.facebook.com/PointsToMiles/" target="_blank" rel="noopener noreferrer" className="font-bold text-[#1877F2] hover:underline transition-colors">Facebook</a> /{' '}
            <a href="https://www.instagram.com/pointstomiles_hk/" target="_blank" rel="noopener noreferrer" className="font-bold text-[#E4405F] hover:underline transition-colors">Instagram</a> 或{' '}
            <a href="https://www.threads.net/@pointstomiles_hk" target="_blank" rel="noopener noreferrer" className="font-bold text-gray-800 hover:underline transition-colors">Threads</a>{' '}
            搵我哋 💬<br className="hidden md:block" />
            或者 Email 給我們：<a href="mailto:travelfrommiles@gmail.com" className="font-bold text-[#006564] hover:text-[#004f4e] hover:underline transition-colors inline-flex items-center gap-1 ml-1"><Mail size={12} className="md:w-3.5 md:h-3.5" /> travelfrommiles@gmail.com</a>
          </p>
          <p className="text-[9px] text-gray-400 font-bold uppercase tracking-[0.2em]">Asia Miles 兌換計算器</p>
        </div>

      </div>
    </div>
  );
}

const root = createRoot(document.getElementById('root'));
root.render(<App />);

  
</script>
</body>
</html>
